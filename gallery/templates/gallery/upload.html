<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Загрузка модели - 3D Storage</title>
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'gallery/style.css' %}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎐</text></svg>">
    
    <!-- Дополнительные стили для точной настройки превью -->
    <style>
        /* Центрируем контейнер с превью */
        .preview-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }
        
        /* Фиксированный размер 300x200 как в методичке */
        #preview-container {
            width: 300px;
            height: 200px;
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            margin: 10px auto;
        }
        
        /* Стили для сообщения внутри превью */
        #preview-container .placeholder {
            display: block;
            padding: 80px 0;
            text-align: center;
            color: #999;
            line-height: 1.4;
        }
        
        /* Адаптация для мобильных */
        @media (max-width: 400px) {
            #preview-container {
                width: 260px;
                height: 173px; /* Сохраняем пропорции */
            }
            
            #preview-container .placeholder {
                padding: 65px 0;
                font-size: 0.9rem;
            }
        }
        
        /* Подсказка по центру */
        .hint {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="page-container">
        <!-- Навигация -->
        <nav class="main-nav">
            <a href="{% url 'home' %}">🏯 Главная</a> ♡
            <a href="{% url 'about' %}">📃 О проекте</a> ♡
            <a href="{% url 'upload' %}" class="active">📥 Загрузка</a>
        </nav>

        <!-- Блок уведомлений -->
        {% if messages %}
        <div class="messages-container">
            {% for message in messages %}
            <div class="alert {{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>

        <script>
            setTimeout(function() {
                const messages = document.querySelectorAll('.alert');
                messages.forEach(function(message) {
                    message.style.transition = 'opacity 0.5s ease-out';
                    message.style.opacity = '0';
                    setTimeout(function() {
                        if (message.parentElement) {
                            message.remove();
                        }
                        const container = document.querySelector('.messages-container');
                        if (container && container.children.length === 0) {
                            container.remove();
                        }
                    }, 500);
                });
            }, 3000);
        </script>
        {% endif %}

        <!-- Основной контент -->
        <main class="content-card">
            <h1 class="text-center">📥 Загрузка 3D модели</h1>
            
            <hr>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <!-- Поля формы -->
                <div class="form-group">
                    {{ form.as_p }}
                </div>
                
                <!-- Блок превью модели 300x200 -->
                <div class="preview-wrapper">
                    
                    <div id="preview-container">
                        <span class="placeholder">Выберите файл...</span>
                    </div>
                    
                    <!-- Скрытое поле для base64 изображения -->
                    <input type="hidden" name="image_data" id="id_image_data">
                </div>
                
                <hr>
                
                <!-- Кнопки -->
                <div class="form-actions">
                    <button type="submit" id="submit-btn" class="btn btn-green" disabled>
                        Загрузить
                    </button>
                    
                    <a href="{% url 'home' %}" class="btn btn-gray">
                        ← Отмена
                    </a>
                </div>
            </form>
        </main>
    </div>

    <!-- Карта импортов для Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- Скрипт авто-генерации превью -->
    <script type="module" src="{% static 'gallery/js/autothumb.js' %}"></script>
</body>

</html>
